<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokepals — Automations for Poke AI</title>
  <meta name="description" content="Discover and install powerful AI automations for Poke — your AI assistant in Apple Messages, WhatsApp, and Telegram.">
  <meta name="theme-color" content="#5E5CE6">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #5E5CE6;
      --accent-lt:    #F0EFFE;
      --accent-dk:    #4340C4;
      --tx1:          #1D1D1F;
      --tx2:          #6E6E73;
      --tx3:          #AEAEB2;
      --bg:           #FAFAFA;
      --surf:         #FFFFFF;
      --surf2:        #F5F5F7;
      --bdr:          rgba(0,0,0,0.08);
      --sh-sm:        0 1px 4px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --sh-md:        0 4px 18px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
      --sh-lg:        0 12px 40px rgba(0,0,0,0.14), 0 3px 10px rgba(0,0,0,0.06);
      --r-sm:  8px;  --r-md: 14px;  --r-lg: 20px;  --r-pill: 100px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
      --mw: 1160px;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }

    html { font-family: var(--font); background: var(--bg); color: var(--tx1); -webkit-font-smoothing: antialiased; }
    body  { min-height: 100svh; }
    a     { color: inherit; }

    /* ── HEADER ─────────────────────────────────────────── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      height: 58px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: rgba(250,250,250,0.82);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--bdr);
    }
    .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .logo-mark {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff; letter-spacing: -0.3px;
    }
    .logo-name { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; color: var(--tx1); }

    /* lang switcher */
    .ls { position: relative; }
    .ls-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: var(--r-pill);
      border: 1px solid var(--bdr); background: var(--surf);
      font-size: 13px; font-weight: 500; color: var(--tx2);
      cursor: pointer; font-family: var(--font);
      transition: background .15s;
    }
    .ls-btn:hover { background: var(--surf2); }
    .ls-menu {
      position: absolute; top: calc(100% + 7px); right: 0;
      min-width: 168px; background: var(--surf);
      border: 1px solid var(--bdr); border-radius: var(--r-md);
      box-shadow: var(--sh-lg); overflow: hidden; display: none; z-index: 300;
    }
    [dir="rtl"] .ls-menu { right: auto; left: 0; }
    .ls-menu.open { display: block; }
    .ls-item {
      padding: 9px 14px; font-size: 13.5px; cursor: pointer;
      display: flex; align-items: center; gap: 9px; transition: background .1s;
    }
    .ls-item:hover { background: var(--surf2); }
    .ls-item.on { font-weight: 600; color: var(--accent); }

    /* ── ONBOARDING ──────────────────────────────────────── */
    .ob {
      overflow: hidden;
      max-height: 500px; opacity: 1;
      transition: max-height .4s var(--ease), opacity .3s;
      background: linear-gradient(170deg, #f5f3ff 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--bdr);
    }
    .ob.gone { max-height: 0; opacity: 0; pointer-events: none; }
    .ob-wrap { max-width: var(--mw); margin: 0 auto; padding: 22px 24px 20px; }
    .ob-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 14px;
    }
    .ob-title { font-size: 15px; font-weight: 600; }
    .ob-sub   { font-size: 13px; color: var(--tx2); margin-top: 2px; }
    .ob-close {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--bdr); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 10px; color: var(--tx3); flex-shrink: 0; margin-top: 1px;
      transition: background .15s;
    }
    .ob-close:hover { background: rgba(0,0,0,0.06); }

    /* OS toggle */
    .seg-bg { display: inline-flex; background: rgba(0,0,0,0.06); border-radius: var(--r-pill); padding: 3px; margin-bottom: 14px; }
    .seg {
      padding: 5px 14px; border-radius: var(--r-pill); font-size: 12.5px; font-weight: 500;
      cursor: pointer; color: var(--tx2); transition: all .15s;
    }
    .seg.on { background: var(--surf); color: var(--tx1); box-shadow: var(--sh-sm); }

    /* app chips */
    .app-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
    .app-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--r-pill);
      border: 1.5px solid var(--bdr); background: var(--surf);
      font-size: 13px; font-weight: 500; cursor: pointer; color: var(--tx2);
      transition: all .15s; font-family: var(--font);
    }
    .app-chip:hover { border-color: rgba(94,92,230,.4); color: var(--tx1); }
    .app-chip.on { border-color: var(--accent); background: var(--accent-lt); color: var(--accent-dk); }

    /* steps */
    .steps-row { display: flex; gap: 9px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .steps-row::-webkit-scrollbar { display: none; }
    .step {
      flex: 0 0 185px; background: var(--surf); border-radius: var(--r-md);
      padding: 14px 15px; border: 1px solid var(--bdr);
      box-shadow: var(--sh-sm);
      animation: fadeUp .25s var(--ease) both;
    }
    .step:nth-child(2) { animation-delay: .05s; }
    .step:nth-child(3) { animation-delay: .1s; }
    .step:nth-child(4) { animation-delay: .15s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .step-n {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; margin-bottom: 9px;
    }
    .step-t { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .step-d { font-size: 11.5px; color: var(--tx2); line-height: 1.55; }

    /* ── HERO ────────────────────────────────────────────── */
    .hero {
      padding: 64px 24px 48px; text-align: center;
      background: radial-gradient(ellipse 110% 70% at 50% 0%, rgba(94,92,230,.1) 0%, transparent 65%);
    }
    .hero-inner { max-width: var(--mw); margin: 0 auto; }
    .hero-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: var(--r-pill); margin-bottom: 20px;
      background: var(--accent-lt); font-size: 11.5px; font-weight: 700;
      color: var(--accent); letter-spacing: .06em; text-transform: uppercase;
    }
    .hero h1 {
      font-size: clamp(36px, 5.8vw, 66px); font-weight: 700;
      letter-spacing: -2px; line-height: 1.06; margin-bottom: 16px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(130deg, var(--accent) 20%, #C084FC 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-p {
      font-size: clamp(15.5px, 1.9vw, 19px); color: var(--tx2);
      max-width: 500px; margin: 0 auto 36px; line-height: 1.68;
      text-wrap: pretty;
    }
    .stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
    .stat-n { font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
    .stat-l { font-size: 12.5px; color: var(--tx2); margin-top: 2px; }

    /* ── FILTER BAR ──────────────────────────────────────── */
    .fbar {
      position: sticky; top: 58px; z-index: 100;
      background: rgba(250,250,250,0.9);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      border-bottom: 1px solid var(--bdr); padding: 10px 24px;
    }
    .fbar-in { max-width: var(--mw); margin: 0 auto; display: flex; gap: 9px; align-items: center; flex-wrap: wrap; }

    .srch { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
    .srch-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--tx3); pointer-events: none; }
    [dir="rtl"] .srch-ico { left: auto; right: 11px; }
    .srch-in {
      width: 100%; padding: 8px 11px 8px 33px;
      border: 1px solid var(--bdr); border-radius: var(--r-pill);
      background: var(--surf); font-size: 13.5px; font-family: var(--font);
      color: var(--tx1); outline: none; transition: border-color .15s, box-shadow .15s;
    }
    [dir="rtl"] .srch-in { padding: 8px 33px 8px 11px; }
    .srch-in:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(94,92,230,.14); }
    .srch-in::placeholder { color: var(--tx3); }

    .pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .pill {
      padding: 6px 13px; border-radius: var(--r-pill); font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1.5px solid transparent; background: var(--surf2);
      color: var(--tx2); white-space: nowrap; font-family: var(--font); transition: all .15s;
    }
    .pill:hover { background: var(--surf); border-color: var(--bdr); color: var(--tx1); }
    .pill.on { background: var(--accent-lt); color: var(--accent); border-color: var(--accent); font-weight: 600; }

    .sort-sel {
      padding: 7px 11px; border: 1px solid var(--bdr); border-radius: var(--r-pill);
      font-size: 13px; font-family: var(--font); color: var(--tx2);
      background: var(--surf); cursor: pointer; outline: none;
    }

    /* ── CONTENT ─────────────────────────────────────────── */
    .content { max-width: var(--mw); margin: 0 auto; padding: 28px 24px 72px; }
    .sec-hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
    .sec-title { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    .sec-count { font-size: 13px; color: var(--tx3); }

    /* ── GRID ────────────────────────────────────────────── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      background: var(--surf); border-radius: var(--r-lg);
      border: 1px solid var(--bdr); padding: 20px;
      display: flex; flex-direction: column; gap: 11px;
      box-shadow: var(--sh-sm);
      transition: box-shadow .2s var(--ease), transform .2s var(--ease), border-color .2s;
    }
    .card:hover { box-shadow: var(--sh-md); transform: translateY(-2px); border-color: rgba(0,0,0,0.11); }

    .c-head { display: flex; gap: 13px; align-items: flex-start; }
    .c-ico {
      width: 50px; height: 50px; border-radius: 13px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
    }
    .c-meta { flex: 1; min-width: 0; }
    .c-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 5px; }
    .bdg { padding: 2px 7px; border-radius: var(--r-pill); font-size: 10.5px; font-weight: 700; letter-spacing: .02em; }
    .bdg-new { background: #DCFCE7; color: #166534; }
    .bdg-pop { background: #FEF9C3; color: #854D0E; }
    .bdg-cat { background: var(--surf2); color: var(--tx2); }
    .c-title  { font-size: 15px; font-weight: 600; letter-spacing: -.15px; line-height: 1.3; }

    .c-desc { font-size: 13px; color: var(--tx2); line-height: 1.6; text-wrap: pretty; }

    .c-installs { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--tx2); }
    .c-installs svg { color: var(--tx3); flex-shrink: 0; }
    .c-installs b   { font-weight: 600; color: var(--tx1); }

    .c-actions { display: flex; gap: 7px; align-items: center; margin-top: 1px; }
    .btn-inst {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 9px 14px; background: var(--accent); color: #fff; border-radius: var(--r-pill);
      font-size: 13.5px; font-weight: 600; text-decoration: none; border: none; cursor: pointer;
      font-family: var(--font); transition: background .15s, transform .1s;
    }
    .btn-inst:hover { background: var(--accent-dk); transform: scale(1.02); }
    .btn-share {
      width: 37px; height: 37px; border-radius: 50%; border: 1px solid var(--bdr);
      background: var(--surf2); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; color: var(--tx2); flex-shrink: 0;
    }
    .btn-share:hover { background: var(--surf); border-color: var(--accent); color: var(--accent); }

    /* ── EMPTY STATE ─────────────────────────────────────── */
    .empty { grid-column: 1/-1; text-align: center; padding: 56px 20px; color: var(--tx3); }
    .empty-ico { font-size: 36px; margin-bottom: 10px; }
    .empty p   { font-size: 15px; }

    /* ── TOAST ───────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--tx1); color: #fff; padding: 10px 20px;
      border-radius: var(--r-pill); font-size: 13.5px; font-weight: 500;
      pointer-events: none; z-index: 999; white-space: nowrap;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── FOOTER ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--bdr); padding: 20px 24px;
      text-align: center; font-size: 12.5px; color: var(--tx3);
    }
    footer a { text-decoration: none; color: var(--tx3); }
    footer a:hover { color: var(--tx2); }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .hdr   { padding: 0 16px; }
      .hero  { padding: 44px 16px 36px; }
      .stats { gap: 22px; }
      .fbar  { padding: 9px 16px; }
      .srch  { max-width: 100%; min-width: 0; flex: 1 1 100%; }
      .content { padding: 20px 16px 56px; }
      .grid  { grid-template-columns: 1fr; gap: 11px; }
      .ob-wrap { padding: 18px 16px 16px; }
      .step  { flex-basis: 170px; }
    }
  </style>
</head>
<body>

<!-- Netlify Identity sends invite/recovery/confirmation links to the site root
     with a token in the URL hash (e.g. #invite_token=...). Only the /admin page
     has the Identity widget loaded (via Decap CMS) to actually process that
     token, so forward it there before anything else runs. -->
<script>
  (function () {
    var h = window.location.hash;
    if (h && /(invite_token|recovery_token|confirmation_token|email_change_token)=/.test(h)) {
      window.location.replace('/admin/' + h);
    }
  })();
</script>

<script>
// ── State ──────────────────────────────────────────────────
let lang = 'en', os = 'ios', app = 'imessage', cat = 'All', obOpen = true;
let AUTOMATIONS = [];
let CATS = ['All'];
let installCounts = {}; // { [automationId]: liveTrackedInstalls } — fetched from /api/install-counts

// ── Boot ───────────────────────────────────────────────────
(async function init() {
  // Auto-detect language
  const bl = (navigator.language || '').slice(0,2);
  if (T[bl]) lang = bl;

  // Auto-detect OS
  if (/android/i.test(navigator.userAgent)) {
    os = 'android'; app = 'whatsapp';
  }

  buildLangMenu();
  applyLang();
  syncOSTabs();
  renderSteps();

  await loadAutomations();
  buildPills();
  doFilter();

  // Close lang menu on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('#ls')) closeLangMenu();
  });
})();

// ── Content (CMS-managed) ────────────────────────────────────
// automations.json is edited via the CMS. Install counts are tracked for
// real in a Netlify Function backed by Netlify Blobs (see netlify/functions/
// install-counts.js) — the JSON's `installs` field is just a starting/seed
// number so the catalog doesn't look empty on day one; the live tracked count
// is added on top everywhere a total is shown.
async function loadAutomations() {
  const [autoRes, countsRes] = await Promise.allSettled([
    fetch('automations.json', { cache: 'no-cache' }),
    fetch('/api/install-counts', { cache: 'no-cache' }),
  ]);

  try {
    if (autoRes.status === 'fulfilled' && autoRes.value.ok) {
      const json = await autoRes.value.json();
      AUTOMATIONS = json.automations || [];
    } else {
      AUTOMATIONS = [];
    }
  } catch {
    AUTOMATIONS = [];
  }

  try {
    installCounts = (countsRes.status === 'fulfilled' && countsRes.value.ok)
      ? await countsRes.value.json()
      : {};
  } catch {
    installCounts = {};
  }

  const cats = new Set();
  AUTOMATIONS.forEach(a => cats.add(a.cat));
  CATS = ['All', ...cats];

  updateHeroStats();
}

// Combined install count for one automation: CMS seed value + live tracked count.
function totalInstalls(a) {
  return (a.installs || 0) + (installCounts[a.id] || 0);
}
function formatCount(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}
// Real, live numbers — not hard-coded marketing stats.
function updateHeroStats() {
  const totalAuto = AUTOMATIONS.length;
  const totalInst = AUTOMATIONS.reduce((sum, a) => sum + totalInstalls(a), 0);
  document.getElementById('stat-auto-n').textContent     = String(totalAuto);
  document.getElementById('stat-installs-n').textContent = formatCount(totalInst);
}

// Fire-and-forget: increments the real counter in the background when someone
// actually clicks Install (the link still opens poke.com in a new tab either way).
function trackInstall(id) {
  fetch('/api/install-counts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id }),
  })
    .then(res => (res.ok ? res.json() : null))
    .then(data => {
      if (data && data.id) {
        installCounts[data.id] = data.installs;
        doFilter();
        updateHeroStats();
      }
    })
    .catch(() => {});
}

// ── Translation helper ─────────────────────────────────────
function t(key) {
  return (T[lang] && T[lang][key] != null ? T[lang][key] : T.en[key]) || key;
}

// ── Apply language to all static elements ──────────────────
function applyLang() {
  const l = LANGS.find(x => x.c === lang) || LANGS[0];
  document.documentElement.lang = lang;
  document.documentElement.dir  = l.dir;

  // Onboarding
  document.getElementById('ob-title').textContent = t('ob_title');
  document.getElementById('ob-sub').textContent   = t('ob_sub');
  document.getElementById('tab-ios').textContent     = t('tab_ios');
  document.getElementById('tab-android').textContent = t('tab_android');
  document.getElementById('chip-im').textContent = t('app_im');
  document.getElementById('chip-wa').textContent = t('app_wa');
  document.getElementById('chip-tg').textContent = t('app_tg');

  // Hero
  document.getElementById('hero-badge').textContent = t('hero_badge');
  document.getElementById('hero-h1a').textContent   = t('hero_h1a');
  document.getElementById('hero-h1b').textContent   = t('hero_h1b');
  document.getElementById('hero-p').textContent     = t('hero_p');
  document.getElementById('st-auto').textContent     = t('st_auto');
  document.getElementById('st-installs').textContent = t('st_installs');

  // Filter bar
  document.getElementById('sIn').placeholder        = t('search_ph');
  document.getElementById('opt-pop').textContent    = t('sort_pop');
  document.getElementById('opt-new').textContent    = t('sort_new');
  document.getElementById('opt-az').textContent     = t('sort_az');

  // Section
  document.getElementById('sec-title').textContent  = t('sec_title');
  document.getElementById('footer-txt').textContent = t('footer') + ' ';

  buildPills();
  updateCount();
}

// ── Language menu ──────────────────────────────────────────
function buildLangMenu() {
  document.getElementById('lmenu').innerHTML = LANGS.map(l =>
    `<div class="ls-item ${l.c === lang ? 'on' : ''}" role="option" aria-selected="${l.c === lang}" onclick="setLang('${l.c}')">${l.flag} ${l.name}</div>`
  ).join('');
}
function toggleMenu() {
  const m = document.getElementById('lmenu');
  m.classList.toggle('open');
  document.getElementById('lbtn').setAttribute('aria-expanded', m.classList.contains('open'));
}
function closeLangMenu() {
  document.getElementById('lmenu').classList.remove('open');
  document.getElementById('lbtn').setAttribute('aria-expanded', 'false');
}
function setLang(c) {
  lang = c;
  const l = LANGS.find(x => x.c === c);
  document.getElementById('lFlag').textContent = l.flag;
  document.getElementById('lCode').textContent = c.toUpperCase();
  closeLangMenu();
  buildLangMenu();
  applyLang();
  doFilter();
  renderSteps();
}

// ── Onboarding ─────────────────────────────────────────────
function closeOb() {
  obOpen = false;
  document.getElementById('ob').classList.add('gone');
}
function syncOSTabs() {
  document.querySelectorAll('.seg').forEach(s => s.classList.remove('on'));
  document.getElementById('tab-' + os).classList.add('on');
  document.querySelectorAll('.app-chip').forEach(c => {
    c.classList.toggle('on', c.dataset.app === app);
  });
}
function setOS(v, el) {
  os = v;
  document.querySelectorAll('.seg').forEach(s => s.classList.remove('on'));
  el.classList.add('on');
  // iMessage unavailable on Android
  if (v === 'android' && app === 'imessage') {
    app = 'whatsapp';
    document.querySelectorAll('.app-chip').forEach(c => c.classList.toggle('on', c.dataset.app === 'whatsapp'));
  }
  renderSteps();
}
function setApp(v, el) {
  app = v;
  document.querySelectorAll('.app-chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  renderSteps();
}
function renderSteps() {
  const key   = app + '_' + os;
  const steps = STEPS[key] || STEPS['whatsapp_ios'];
  const appLabel = { imessage: t('app_im'), whatsapp: t('app_wa'), telegram: t('app_tg') }[app];
  document.getElementById('stepsRow').innerHTML = steps.map(([title, desc], i) =>
    `<div class="step" role="listitem">
      <div class="step-n">${i + 1}</div>
      <div class="step-t">${title.replace('{app}', appLabel)}</div>
      <div class="step-d">${desc}</div>
    </div>`
  ).join('');
}

// ── Filters ────────────────────────────────────────────────
function buildPills() {
  document.getElementById('pillRow').innerHTML = CATS.map(c => {
    const label = c === 'All' ? t('all_label') : c;
    return `<button class="pill ${cat === c ? 'on' : ''}" onclick="setCat('${c}')">${label}</button>`;
  }).join('');
}
function setCat(c) { cat = c; buildPills(); doFilter(); }
function doFilter() {
  const q    = (document.getElementById('sIn').value || '').toLowerCase();
  const sort = document.getElementById('sortSel').value;

  let list = AUTOMATIONS.filter(a => {
    const name = a.name.toLowerCase();
    const desc = a.description.toLowerCase();
    const matchQ   = !q || name.includes(q) || desc.includes(q) || a.cat.toLowerCase().includes(q);
    const matchCat = cat === 'All' || a.cat === cat;
    return matchQ && matchCat;
  });

  list = [...list].sort((a, b) => {
    if (sort === 'popular') return totalInstalls(b) - totalInstalls(a);
    if (sort === 'newest')  return (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0);
    return a.name.localeCompare(b.name);
  });

  renderCards(list);
  updateCount(list.length);
}
function updateCount(n) {
  const total = n !== undefined ? n : AUTOMATIONS.length;
  const fn    = (T[lang] && T[lang].result_count) || T.en.result_count;
  document.getElementById('sec-count').textContent = fn(total);
}

// ── Card rendering ─────────────────────────────────────────
function renderCards(list) {
  if (!list.length) {
    document.getElementById('grid').innerHTML =
      `<div class="empty"><div class="empty-ico">🔍</div><p>${t('no_results')}</p></div>`;
    return;
  }
  document.getElementById('grid').innerHTML = list.map(a => {
    const nameEsc = a.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<article class="card">
      <div class="c-head">
        <div class="c-ico" style="background:${a.bg}">${a.icon}</div>
        <div class="c-meta">
          <div class="c-badges">
            ${a.isNew     ? `<span class="bdg bdg-new">${t('bdg_new')}</span>` : ''}
            ${a.isPopular ? `<span class="bdg bdg-pop">🔥 ${t('bdg_pop')}</span>` : ''}
            <span class="bdg bdg-cat">${a.cat}</span>
          </div>
          <div class="c-title">${a.name}</div>
        </div>
      </div>
      <div class="c-desc">${a.description}</div>
      <div class="c-installs">
        <svg width="13" height="13" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M6 1v7M3 5.5l3 3 3-3M1 10.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span><b>${formatCount(totalInstalls(a))}</b> ${t('installs_label')}</span>
      </div>
      <div class="c-actions">
        <a href="https://poke.com/r/${a.id}" class="btn-inst" target="_blank" rel="noopener" onclick="trackInstall('${a.id}')">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M6 1v7M3 5.5l3 3 3-3M1 10.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          ${t('btn_install')}
        </a>
        <button class="btn-share" onclick="doShare('${a.id}','${nameEsc}',event)" aria-label="Share">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="11" cy="2.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
            <circle cx="11" cy="11.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
            <circle cx="3"  cy="7"   r="1.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M4.5 6.2L9.5 3M4.5 7.8L9.5 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </article>`;
  }).join('');
}

// ── Share ──────────────────────────────────────────────────
function doShare(id, name, e) {
  e.preventDefault();
  const url = 'https://poke.com/r/' + id;
  const fn  = (T[lang] && T[lang].share_title) || T.en.share_title;
  if (navigator.share) {
    navigator.share({ title: fn(name), url }).catch(() => {});
    return;
  }
  navigator.clipboard.writeText(url).then(() => showToast(t('copied')));
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
